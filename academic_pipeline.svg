<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">Document2All Academic Pipeline</title>
  <desc id="desc">Academic style flowchart describing the Document2All pipeline from document parsing to content planning and HTML generation.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#335c81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#516b88"/>
    </marker>
    <style>
      text {
        font-family: "Times New Roman", "Noto Serif CJK SC", "Source Han Serif SC", serif;
        fill: #14263a;
      }
      .sans {
        font-family: "Helvetica Neue", Arial, "Noto Sans CJK SC", sans-serif;
      }
      .title {
        font-size: 34px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 0.5px;
      }
      .subtitle {
        font-size: 15px;
        fill: #dbe7f2;
      }
      .phase-title {
        font-size: 23px;
        font-weight: 700;
      }
      .phase-body {
        font-size: 16px;
      }
      .mini-title {
        font-size: 15px;
        font-weight: 700;
      }
      .mini-text {
        font-size: 13px;
      }
      .code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }
      .legend {
        font-size: 13px;
      }
      .tag {
        font-family: "Helvetica Neue", Arial, "Noto Sans CJK SC", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.6px;
      }
      .arrow {
        stroke: #516b88;
        stroke-width: 3.2;
        fill: none;
        marker-end: url(#arrow);
      }
      .guide {
        stroke: #90a4b8;
        stroke-width: 1.4;
        stroke-dasharray: 7 6;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1280" fill="url(#bg)"/>
  <rect x="48" y="42" width="1704" height="1196" rx="30" fill="#fdfefe" stroke="#d7e0ea" stroke-width="2"/>

  <rect x="48" y="42" width="1704" height="112" rx="30" fill="url(#headerGrad)"/>
  <text x="88" y="97" class="title sans">Document2All Main Pipeline</text>
  <text x="88" y="126" class="subtitle sans">Document parsing, multimodal enrichment, content planning, and layout-to-HTML generation</text>

  <rect x="1360" y="72" width="334" height="54" rx="14" fill="#edf4fb" opacity="0.16"/>
  <text x="1388" y="106" class="subtitle sans">Entry: fullPipeline/pipeline.py::presentation_generate</text>

  <line x1="230" y1="180" x2="230" y2="1146" class="guide"/>
  <line x1="620" y1="180" x2="620" y2="1146" class="guide"/>
  <line x1="1030" y1="180" x2="1030" y2="1146" class="guide"/>
  <line x1="1435" y1="180" x2="1435" y2="1146" class="guide"/>

  <text x="86" y="200" class="legend sans" fill="#5a6f82">Input</text>
  <text x="345" y="200" class="legend sans" fill="#5a6f82">Parsing and Enrichment</text>
  <text x="760" y="200" class="legend sans" fill="#5a6f82">Content Planning</text>
  <text x="1180" y="200" class="legend sans" fill="#5a6f82">Layout Synthesis</text>
  <text x="1560" y="200" class="legend sans" fill="#5a6f82">Artifacts</text>

  <g filter="url(#shadow)">
    <rect x="88" y="248" width="260" height="178" rx="22" fill="#e8f1fb" stroke="#9ab6d1" stroke-width="2"/>
    <rect x="88" y="248" width="260" height="40" rx="22" fill="#cfe0f3"/>
    <text x="112" y="274" class="tag sans" fill="#214765">INPUT</text>
    <text x="112" y="323" class="phase-title">Source Document</text>
    <text x="112" y="353" class="phase-body">PDF / scientific paper / report</text>
    <text x="112" y="384" class="mini-text code">type: Path | str</text>
    <text x="112" y="408" class="mini-text code">arg: --doc_path</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="386" y="228" width="560" height="228" rx="24" fill="#f5f8fc" stroke="#a9b9ca" stroke-width="2"/>
    <rect x="386" y="228" width="560" height="44" rx="24" fill="#dfe7f0"/>
    <text x="410" y="256" class="tag sans" fill="#314c67">STAGE 1</text>
    <text x="414" y="316" class="phase-title">Document Parsing</text>
    <text x="414" y="348" class="phase-body">`mineru_process(input_path, output_path)`</text>
    <text x="414" y="381" class="mini-text">Transforms raw document pages into machine-readable multimodal assets.</text>
    <text x="414" y="410" class="mini-text code">primary output: .md + content_list.json + dict/images.json + dict/tables.json</text>

    <rect x="692" y="292" width="222" height="132" rx="16" fill="#ffffff" stroke="#ccd7e2"/>
    <text x="712" y="318" class="mini-title sans">Core data objects</text>
    <text x="712" y="344" class="mini-text code">content_list: list[dict]</text>
    <text x="712" y="366" class="mini-text code">images.json: list[ImageItem]</text>
    <text x="712" y="388" class="mini-text code">tables.json: list[TableItem]</text>
    <text x="712" y="410" class="mini-text code">md: str</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="386" y="500" width="560" height="170" rx="24" fill="#f7fbf7" stroke="#a6c4ac" stroke-width="2"/>
    <rect x="386" y="500" width="560" height="44" rx="24" fill="#dceedd"/>
    <text x="410" y="528" class="tag sans" fill="#325f41">STAGE 2</text>
    <text x="414" y="586" class="phase-title">Visual Enrichment</text>
    <text x="414" y="618" class="phase-body">`postProcessImages(output_path, file_name)`</text>
    <text x="414" y="648" class="mini-text">Adds VLM captions and image dimensions for each figure/table item.</text>

    <rect x="681" y="552" width="233" height="92" rx="16" fill="#ffffff" stroke="#cadecf"/>
    <text x="700" y="580" class="mini-title sans">Field augmentation</text>
    <text x="700" y="603" class="mini-text code">llm_description: str</text>
    <text x="700" y="624" class="mini-text code">weight / height: "1234px"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="386" y="716" width="560" height="170" rx="24" fill="#fffaf2" stroke="#ceb993" stroke-width="2"/>
    <rect x="386" y="716" width="560" height="44" rx="24" fill="#f4e6ca"/>
    <text x="410" y="744" class="tag sans" fill="#7a5c1a">STAGE 3</text>
    <text x="414" y="802" class="phase-title">Markdown Context Injection</text>
    <text x="414" y="834" class="phase-body">`insertDictInMD(output_path, file_name)`</text>
    <text x="414" y="864" class="mini-text">Replaces raw placeholders in markdown with structured figure/table JSON snippets.</text>

    <rect x="693" y="768" width="221" height="92" rx="16" fill="#ffffff" stroke="#ead9b4"/>
    <text x="712" y="796" class="mini-title sans">Resulting MD</text>
    <text x="712" y="819" class="mini-text code">str with embedded JSON</text>
    <text x="712" y="840" class="mini-text">Better context for LLM planning</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1058" y="308" width="562" height="318" rx="24" fill="#f8f5fc" stroke="#b7a9cf" stroke-width="2"/>
    <rect x="1058" y="308" width="562" height="44" rx="24" fill="#e7e0f3"/>
    <text x="1082" y="336" class="tag sans" fill="#5a4678">STAGE 4</text>
    <text x="1086" y="396" class="phase-title">Content Planning</text>
    <text x="1086" y="428" class="phase-body">`content_plan_with_check(raw_content_dir, file_name, mode)`</text>
    <text x="1086" y="460" class="mini-text">Uses prompt templates plus enriched markdown to produce a display-oriented content plan.</text>
    <text x="1086" y="490" class="mini-text">Optional branch: `content_check` and `content_replan` loop.</text>

    <rect x="1092" y="526" width="240" height="72" rx="16" fill="#ffffff" stroke="#d5cde4"/>
    <text x="1112" y="552" class="mini-title sans">Input</text>
    <text x="1112" y="575" class="mini-text code">md: str, mode: Literal["ppt"|"poster"|"web"]</text>

    <rect x="1360" y="526" width="226" height="72" rx="16" fill="#ffffff" stroke="#d5cde4"/>
    <text x="1380" y="552" class="mini-title sans">Output</text>
    <text x="1380" y="575" class="mini-text code">content_plan: dict</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1060" y="684" width="560" height="222" rx="24" fill="#f2f8ff" stroke="#9bb2d1" stroke-width="2"/>
    <rect x="1060" y="684" width="560" height="44" rx="24" fill="#dbe7f6"/>
    <text x="1084" y="712" class="tag sans" fill="#31577e">STAGE 5</text>
    <text x="1088" y="772" class="phase-title">Layout-to-HTML Generation</text>
    <text x="1088" y="804" class="phase-body">`htmlGenerate(content_plan, data_type=mode)`</text>
    <text x="1088" y="836" class="mini-text">A local fine-tuned causal LM converts the structured plan into full HTML/CSS.</text>
    <text x="1088" y="866" class="mini-text">Followed by `changeHTML(html_code)` for path or markup cleanup.</text>

    <rect x="1376" y="742" width="210" height="124" rx="16" fill="#ffffff" stroke="#cad9ea"/>
    <text x="1395" y="770" class="mini-title sans">Generation contract</text>
    <text x="1395" y="793" class="mini-text code">input: dict | str</text>
    <text x="1395" y="815" class="mini-text code">output: html_code: str</text>
    <text x="1395" y="837" class="mini-text code">mode: poster | web</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1455" y="958" width="210" height="208" rx="22" fill="#f7fafc" stroke="#b9c8d6" stroke-width="2"/>
    <rect x="1455" y="958" width="210" height="40" rx="22" fill="#e4edf4"/>
    <text x="1478" y="984" class="tag sans" fill="#36516a">OUTPUTS</text>
    <text x="1478" y="1030" class="mini-title sans">Saved artifacts</text>
    <text x="1478" y="1056" class="mini-text code">{file_name}.html</text>
    <text x="1478" y="1080" class="mini-text code">contentPlan/final_content_plan.json</text>
    <text x="1478" y="1104" class="mini-text code">dict/images.json</text>
    <text x="1478" y="1128" class="mini-text code">dict/tables.json</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="970" width="1290" height="170" rx="24" fill="#fbfcfd" stroke="#c8d2db" stroke-width="2"/>
    <text x="122" y="1012" class="phase-title">Representative Data Schema</text>
    <text x="122" y="1043" class="mini-text code">ImageItem = { fig_id: str, path: str, caption: str, content_list_index: int, llm_description: str, weight: str, height: str }</text>
    <text x="122" y="1072" class="mini-text code">TableItem = { table_id: str, path: str, caption: str, table_body: str, content_list_index: int, llm_description: str, weight: str, height: str }</text>
    <text x="122" y="1101" class="mini-text code">content_plan ~= { metadata: dict, sections: list[dict] }   or   { metadata: dict, slides: list[dict] }</text>
  </g>

  <path d="M348 337 L386 337" class="arrow"/>
  <path d="M666 456 L666 500" class="arrow"/>
  <path d="M666 670 L666 716" class="arrow"/>
  <path d="M946 801 C1000 801 1000 468 1058 468" class="arrow"/>
  <path d="M1340 626 L1340 684" class="arrow"/>
  <path d="M1620 795 C1670 795 1670 1062 1665 1062" class="arrow"/>

  <path d="M1320 468 C1430 468 1450 468 1450 468 C1450 468 1450 602 1450 602 C1450 602 1220 602 1220 602" fill="none" stroke="#8f7cab" stroke-width="2.4" stroke-dasharray="8 6"/>
  <text x="1462" y="538" class="mini-text sans" fill="#6a5888">check / replan loop</text>

  <rect x="108" y="454" width="220" height="112" rx="18" fill="#ffffff" stroke="#ced8e1"/>
  <text x="128" y="483" class="mini-title sans">Control parameters</text>
  <text x="128" y="507" class="mini-text code">mode: ppt | poster | web</text>
  <text x="128" y="529" class="mini-text code">output: Path</text>
  <text x="128" y="551" class="mini-text code">file_name = Path(doc).stem</text>

  <rect x="109" y="594" width="219" height="132" rx="18" fill="#ffffff" stroke="#ced8e1"/>
  <text x="128" y="623" class="mini-title sans">Why this pipeline</text>
  <text x="128" y="647" class="mini-text">1. Parse the source document.</text>
  <text x="128" y="670" class="mini-text">2. Enrich visual evidence.</text>
  <text x="128" y="693" class="mini-text">3. Reorganize content for presentation.</text>
  <text x="128" y="716" class="mini-text">4. Render a target medium.</text>

  <rect x="1490" y="230" width="210" height="168" rx="18" fill="#ffffff" stroke="#d1dbe4"/>
  <text x="1510" y="260" class="mini-title sans">Mode semantics</text>
  <text x="1510" y="286" class="mini-text"><tspan class="code">ppt</tspan> slide-structured plan</text>
  <text x="1510" y="310" class="mini-text"><tspan class="code">poster</tspan> dense multi-column canvas</text>
  <text x="1510" y="334" class="mini-text"><tspan class="code">web</tspan> scroll-based page layout</text>
  <text x="1510" y="367" class="mini-text">All branches share the same</text>
  <text x="1510" y="389" class="mini-text">parse-and-plan backbone.</text>

  <text x="88" y="1190" class="legend sans" fill="#708295">Figure. Academic summary of the current Document2All execution pipeline and its principal intermediate data representations.</text>
</svg>
