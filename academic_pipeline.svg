<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Academic Redraw of the Poster Generation Architecture</title>
  <desc id="desc">Academic-style architecture diagram showing user requirements, blueprint creation, graphical background generation, and unified layout-text rendering.</desc>

  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8fb"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfcfe"/>
    </linearGradient>
    <linearGradient id="blueArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b95c8"/>
      <stop offset="100%" stop-color="#4e6fa8"/>
    </linearGradient>
    <linearGradient id="purpleArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9576c7"/>
      <stop offset="100%" stop-color="#6f56a4"/>
    </linearGradient>
    <linearGradient id="greenArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#87aa6d"/>
      <stop offset="100%" stop-color="#557a42"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1a2b43" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#5f7fb4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#7758a9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#5e8648"/>
    </marker>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#dde4ee" stroke-width="1"/>
    </pattern>
    <style>
      text {
        font-family: "Times New Roman", "Noto Serif CJK SC", "Source Han Serif SC", serif;
        fill: #17304d;
      }
      .sans {
        font-family: "Helvetica Neue", Arial, "Noto Sans CJK SC", sans-serif;
      }
      .title {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .section {
        font-size: 18px;
        font-weight: 700;
      }
      .panel-title {
        font-size: 22px;
        font-weight: 700;
      }
      .module-title {
        font-size: 15px;
        font-weight: 700;
      }
      .body {
        font-size: 14px;
      }
      .small {
        font-size: 12.5px;
      }
      .tiny {
        font-size: 11px;
      }
      .code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }
      .caption {
        font-size: 13px;
        font-style: italic;
      }
      .dash-blue {
        fill: none;
        stroke: #5677b1;
        stroke-width: 2.6;
        stroke-dasharray: 10 8;
      }
      .dash-purple {
        fill: none;
        stroke: #7a59ac;
        stroke-width: 2.6;
        stroke-dasharray: 10 8;
      }
      .dash-green {
        fill: none;
        stroke: #64894f;
        stroke-width: 2.6;
        stroke-dasharray: 10 8;
      }
      .flow-blue {
        fill: none;
        stroke: url(#blueArrow);
        stroke-width: 3.4;
        marker-end: url(#arrowBlue);
      }
      .flow-purple {
        fill: none;
        stroke: url(#purpleArrow);
        stroke-width: 3.4;
        marker-end: url(#arrowPurple);
      }
      .flow-green {
        fill: none;
        stroke: url(#greenArrow);
        stroke-width: 3.4;
        marker-end: url(#arrowGreen);
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="980" fill="url(#pageBg)"/>
  <rect x="34" y="30" width="1732" height="920" rx="28" fill="url(#panelFill)" stroke="#d8e0ea" stroke-width="2"/>
  <rect x="34" y="30" width="1732" height="920" rx="28" fill="url(#grid)" opacity="0.42"/>

  <text x="900" y="78" class="title" text-anchor="middle">Academic Poster Generation Framework</text>
  <text x="900" y="108" class="caption" text-anchor="middle">A structured pipeline for requirement-grounded blueprint construction, background synthesis, and unified multimodal rendering</text>

  <g filter="url(#softShadow)">
    <rect x="76" y="150" width="300" height="300" rx="18" fill="#ffffff" stroke="#6a8ab5" stroke-width="2.4"/>
    <text x="226" y="132" class="section" text-anchor="middle">User Requirement</text>
    <circle cx="106" cy="117" r="16" fill="none" stroke="#152e49" stroke-width="3"/>
    <path d="M89 144c5-18 29-18 34 0" fill="none" stroke="#152e49" stroke-width="3" stroke-linecap="round"/>
    <path d="M129 86c0-11-9-20-20-20s-20 9-20 20 9 20 20 20h8l11 10-3-14c3-4 4-10 4-16z" fill="none" stroke="#152e49" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="101" cy="85" r="2.5" fill="#152e49"/>
    <circle cx="109" cy="85" r="2.5" fill="#152e49"/>
    <circle cx="117" cy="85" r="2.5" fill="#152e49"/>

    <path d="M100 166h247v242h-210l-37 28v-28h0z" fill="#f8fbff" stroke="#5d80b6" stroke-width="2.2"/>
    <text x="124" y="197" class="body sans">
      <tspan x="124" dy="0">I need a 1080×1920 holiday poster</tspan>
      <tspan x="124" dy="22">for the Dragon Boat Festival,</tspan>
      <tspan x="124" dy="22">combining the national style with</tspan>
      <tspan x="124" dy="22">traditional motifs such as dragon</tspan>
      <tspan x="124" dy="22">boats, willow trees, and misty</tspan>
      <tspan x="124" dy="22">landscapes. Use a teal-green palette,</tspan>
      <tspan x="124" dy="22">show the festival title, date, holiday</tspan>
      <tspan x="124" dy="22">arrangements, safety notes, and</tspan>
      <tspan x="124" dy="22">contact information.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="434" y="136" width="938" height="368" rx="26" fill="#fcfdff" stroke="#597bb1" stroke-width="2.8" stroke-dasharray="10 8"/>
    <text x="903" y="112" class="panel-title" text-anchor="middle">Stage 1: Blueprint Creation</text>

    <rect x="470" y="176" width="860" height="94" rx="16" fill="#f4fbfb" stroke="#5ba3a3" stroke-width="2"/>
    <text x="900" y="160" class="section" text-anchor="middle" fill="#256565">Key Information</text>

    <rect x="490" y="193" width="180" height="28" rx="8" fill="#d9efef"/>
    <rect x="676" y="193" width="210" height="28" rx="8" fill="#d9efef"/>
    <rect x="892" y="193" width="198" height="28" rx="8" fill="#d9efef"/>
    <rect x="1096" y="193" width="206" height="28" rx="8" fill="#d9efef"/>
    <text x="503" y="212" class="module-title sans">Resolution</text>
    <text x="699" y="212" class="module-title sans">Theme</text>
    <text x="915" y="212" class="module-title sans">Element</text>
    <text x="1118" y="212" class="module-title sans">Purpose</text>
    <text x="579" y="247" class="body sans">1080 × 1920</text>
    <text x="742" y="247" class="body sans">Dragon Boat Festival</text>
    <text x="938" y="247" class="body sans">Calendar, dragon boat, willow, mist</text>
    <text x="1168" y="247" class="body sans">Holiday notice poster</text>

    <rect x="470" y="296" width="430" height="150" rx="16" fill="#fffaf0" stroke="#d2af48" stroke-width="2"/>
    <text x="685" y="282" class="section" text-anchor="middle" fill="#8c6d17">Textual Content</text>
    <rect x="490" y="316" width="100" height="28" rx="8" fill="#f6e6ad"/>
    <rect x="490" y="352" width="100" height="28" rx="8" fill="#f6e6ad"/>
    <rect x="490" y="388" width="100" height="28" rx="8" fill="#f6e6ad"/>
    <text x="510" y="335" class="module-title sans">Title</text>
    <text x="510" y="371" class="module-title sans">Subtitle</text>
    <text x="510" y="407" class="module-title sans">Content</text>
    <text x="614" y="335" class="body sans">端午放假通知 | DRAGON BOAT FESTIVAL</text>
    <text x="614" y="371" class="body sans">Chinese Traditional Festival</text>
    <text x="614" y="407" class="body sans">Holiday schedule, travel notice, and safety guidance</text>

    <rect x="920" y="296" width="376" height="150" rx="16" fill="#f9f7f3" stroke="#bb8654" stroke-width="2"/>
    <text x="1108" y="282" class="section" text-anchor="middle" fill="#8a5b32">Background Graphical Attributes</text>
    <rect x="944" y="316" width="92" height="28" rx="8" fill="#f6e0cd"/>
    <rect x="944" y="352" width="92" height="28" rx="8" fill="#f6e0cd"/>
    <text x="968" y="335" class="module-title sans">Style</text>
    <text x="960" y="371" class="module-title sans">Caption</text>
    <text x="1050" y="335" class="body sans">Illustrative ink-wash composition</text>
    <text x="1050" y="371" class="small sans">
      <tspan x="1050" dy="0">Elegant Chinese-style waterscape with</tspan>
      <tspan x="1050" dy="18">dragon boats gliding across layered</tspan>
      <tspan x="1050" dy="18">mountains, morning mist, and soft reeds.</tspan>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1400" y="136" width="280" height="368" rx="24" fill="#fffdf9" stroke="#a4602b" stroke-width="2.8" stroke-dasharray="10 8"/>
    <text x="1540" y="118" class="panel-title" text-anchor="middle" fill="#8d5628">LoRA Style Bank</text>

    <rect x="1438" y="186" width="204" height="52" rx="12" fill="#fae7d6"/>
    <rect x="1438" y="258" width="204" height="52" rx="12" fill="#fae7d6"/>
