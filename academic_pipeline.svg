    <text x="1593" y="690" class="panel-title sans" text-anchor="middle">T2I</text>
    <rect x="1532" y="740" width="122" height="38" rx="10" fill="#cceadf"/>
    <text x="1593" y="765" class="module-title sans" text-anchor="middle">Resolution</text>
