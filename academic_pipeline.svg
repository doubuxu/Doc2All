    <text x="1540" y="291" class="panel-title sans" text-anchor="middle">Illustrative</text>
    <text x="1540" y="363" class="panel-title sans" text-anchor="middle">Photorealistic</text>
    <text x="1540" y="435" class="panel-title sans" text-anchor="middle">Minimalistic</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="76" y="532" width="1120" height="322" rx="24" fill="#fdfcff" stroke="#7b59ac" stroke-width="2.8" stroke-dasharray="10 8"/>
    <text x="636" y="892" class="panel-title" text-anchor="middle" fill="#6d4c9b">Stage 3: Unified Layout-Text Rendering</text>

    <rect x="110" y="564" width="128" height="212" rx="14" fill="#ffffff" stroke="#c7d3e4" stroke-width="1.8"/>
    <rect x="118" y="572" width="112" height="196" rx="10" fill="#eff6f9"/>
    <rect x="128" y="586" width="92" height="18" rx="4" fill="#4e8ca1"/>
    <text x="174" y="599" class="tiny sans" text-anchor="middle" fill="#ffffff">DRAGON BOAT FESTIVAL</text>
    <rect x="130" y="618" width="88" height="96" rx="8" fill="#d9eff0"/>
    <path d="M138 692c18-38 32-63 54-66 22-4 33 11 42 28v52h-96z" fill="#b6d9d8"/>
    <path d="M144 700c26-9 46-8 70 2" fill="none" stroke="#79a6a6" stroke-width="2"/>
    <path d="M160 683c18 3 28 10 36 18" fill="none" stroke="#3f7f7a" stroke-width="2"/>
    <rect x="128" y="724" width="92" height="12" rx="4" fill="#c0d8d8"/>
    <rect x="128" y="742" width="92" height="10" rx="4" fill="#d8e6e6"/>
    <text x="174" y="797" class="small sans" text-anchor="middle">Poster Output</text>

    <text x="342" y="704" class="panel-title" fill="#724fa6">HTML2Pix</text>
    <rect x="470" y="548" width="286" height="258" rx="18" fill="#ffffff" stroke="#8c67bd" stroke-width="2"/>
    <text x="613" y="573" class="tiny code" text-anchor="middle">&lt;div class="poster-container"&gt;</text>
    <text x="500" y="603" class="tiny code">
      <tspan x="500" dy="0">&lt;style&gt;#poster{width:1080px;height:1920px;</tspan>
      <tspan x="500" dy="16">background-image:url(...);font-family:'Songti SC'}&lt;/style&gt;</tspan>
      <tspan x="500" dy="26">&lt;h1&gt;端午放假通知&lt;/h1&gt;</tspan>
      <tspan x="500" dy="16">&lt;h2&gt;Dragon Boat Festival&lt;/h2&gt;</tspan>
      <tspan x="500" dy="16">&lt;section class="calendar"&gt;...&lt;/section&gt;</tspan>
      <tspan x="500" dy="16">&lt;section class="notice"&gt;...</tspan>
      <tspan x="500" dy="16">  日期：5月31日 - 6月2日</tspan>
      <tspan x="500" dy="16">  出行提示：注意交通安全</tspan>
      <tspan x="500" dy="16">  联系方式：001-12345678</tspan>
      <tspan x="500" dy="16">&lt;/section&gt;</tspan>
      <tspan x="500" dy="16">&lt;/div&gt;</tspan>
    </text>

    <rect x="916" y="574" width="114" height="70" rx="14" fill="#ece4f8" stroke="#b39ad8"/>
    <text x="973" y="618" class="panel-title sans" text-anchor="middle">VLM</text>
    <rect x="980" y="548" width="166" height="72" rx="12" fill="#ffffff" stroke="#b89fe0" stroke-width="1.8"/>
    <text x="1063" y="577" class="module-title sans" text-anchor="middle">Structured prompt</text>
    <text x="1063" y="598" class="small sans" text-anchor="middle">key info + text blocks</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1220" y="532" width="460" height="322" rx="24" fill="#fcfefb" stroke="#64894f" stroke-width="2.8" stroke-dasharray="10 8"/>
    <text x="1450" y="892" class="panel-title" text-anchor="middle" fill="#5b7f46">Stage 2: Graphical Background Generation</text>

    <rect x="1262" y="564" width="168" height="216" rx="14" fill="#ffffff" stroke="#c7d8c4" stroke-width="1.8"/>
    <rect x="1272" y="574" width="148" height="196" rx="10" fill="#edf7f2"/>
    <path d="M1274 698c26-58 55-92 91-96 26-3 43 11 55 29v139h-146z" fill="#cae7df"/>
    <path d="M1272 652c26-45 48-68 82-72 31-4 47 12 66 32v50h-148z" fill="#b1d8d6"/>
