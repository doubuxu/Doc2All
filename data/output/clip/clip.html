        const slidesContainer = document.getElementById('slides');
        let slideCount = pptData.slides.length;
        slidesContainer.style.width = slideCount * 100 + 'vw';

        pptData.slides.forEach((slide, index) => {
            const section = document.createElement('section');
            section.className = 'slide';
            section.id = slide.id;

            const title = document.createElement('h1');
            title.textContent = slide.title;
            section.appendChild(title);

            const content = document.createElement('p');
            content.innerHTML = slide.content.split('\n').map(line => `<span>${line}</span><br>`).join('');
            section.appendChild(content);

            if (slide.figures && slide.figures.length > 0) {
                slide.figures.forEach(fig => {
                    const img = document.createElement('img');
                    img.src = fig.base64_code;
                    img.alt = fig.fig_id;
                    section.appendChild(img);
                });
            }

            if (slide.tables && slide.tables.length > 0) {
                slide.tables.forEach(table => {
                    const img = document.createElement('img');
                    img.src = table.base64_code;
                    img.alt = table.table_id;
                    section.appendChild(img);
                });
            }

            slidesContainer.appendChild(section);
        });

        let currentSlideIndex = 0;

        function showSlide(index) {
            if (index < 0 || index >= slideCount) return;
            currentSlideIndex = index;
            slidesContainer.style.transform = `translateX(-${currentSlideIndex * 100}vw)`;
        }

        document.getElementById('prev').addEventListener('click', () => {
            showSlide(currentSlideIndex - 1);
        });

        document.getElementById('next').addEventListener('click', () => {
            showSlide(currentSlideIndex + 1);
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowLeft') {
                showSlide(currentSlideIndex - 1);
            } else if (event.key === 'ArrowRight') {
                showSlide(currentSlideIndex + 1);
            }
        });

        showSlide(0);
    </script>
