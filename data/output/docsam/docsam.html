<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Times New Roman', serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.6;
      padding: 0 40px;
    }

    .viewport {
      max-width: 1360px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .page {
      padding: 40px 0;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 24px;
      text-align: center;
    }

    h2 {
      font-size: 2rem;
      margin: 40px 0 24px 0;
    }

    p {
      font-size: 1.5rem;
      white-space: pre-wrap;
      margin-bottom: 24px;
    }

    .paper-section {
      margin-bottom: 40px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 24px auto;
    }

    @media (max-width: 1440px) {
      body {
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="page">
      <h1 id="page-title"></h1>
      <!-- Sections will be injected here -->
    </div>
  </div>

  <script>
    const pageData = {
  "metadata": {
    "title": "",
    "authors": "",
    "affiliation": "",
    "date": ""
  },
  "sections": []
};

    // DOM construction
    document.getElementById('page-title').textContent = pageData.metadata.title;

    const pageContainer = document.querySelector('.page');

    pageData.sections.forEach(section => {
      const sectionEl = document.createElement('section');
      sectionEl.className = 'paper-section';

      const titleEl = document.createElement('h2');
      titleEl.textContent = section.title;
      sectionEl.appendChild(titleEl);

      const contentEl = document.createElement('p');
      contentEl.textContent = section.content;
      sectionEl.appendChild(contentEl);

      if (section.figures && section.figures.length > 0) {
        section.figures.forEach(fig => {
          const img = document.createElement('img');
          img.src = fig.base64_code;
          img.alt = fig.fig_id;
          sectionEl.appendChild(img);
        });
      }

      if (section.tables && section.tables.length > 0) {
        section.tables.forEach(tbl => {
          const img = document.createElement('img');
          img.src = tbl.base64_code;
          img.alt = tbl.table_id;
          sectionEl.appendChild(img);
        });
      }

      pageContainer.appendChild(sectionEl);
    });
  </script>
</body>
</html>
