<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOCSAM: UNIFIED DOCUMENT IMAGE SEGMENTATION VIA QUERY DECOMPOSITION AND HETEROGENEOUS MIXED LEARNING</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #333333;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .slides-container {
      display: flex;
      height: 100vh;
      transition: transform 0.3s ease-in-out;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      scroll-snap-align: start;
    }

    .slide h1 {
      font-size: 28px;
      margin-bottom: 24px;
      text-align: center;
      line-height: 1.4;
    }

    .slide p {
      font-size: 18px;
      line-height: 1.6;
      text-align: left;
      max-width: 900px;
      white-space: pre-wrap;
    }

    .slide img {
      max-width: 90%;
      max-height: 70vh;
      margin-top: 20px;
      object-fit: contain;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }

    .nav-buttons {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
    }

    .nav-btn {
      padding: 8px 16px;
      font-size: 16px;
      background-color: #f0f0f0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .nav-btn:hover {
      background-color: #dcdcdc;
    }

    .nav-btn:disabled {
      background-color: #f8f8f8;
      color: #aaa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="slides-container" id="slidesContainer"></div>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn">上一页</button>
      <button class="nav-btn" id="nextBtn">下一页</button>
    </div>
  </div>

  <script>
    const pptData = {
      "slides": [
        {
          "id": "slide_01",
          "title": "DOCSAM: UNIFIED DOCUMENT IMAGE SEGMENTATION VIA QUERY DECOMPOSITION AND HETEROGENEOUS MIXED LEARNING",
          "content": "Xiao-Hui Li, Fei Yin, Cheng-Lin Liu\nMAIS, Institute of Automation of Chinese Academy of Sciences\nSchool of Artificial Intelligence, University of Chinese Academy of Sciences",
          "tables": [],
          "figures": []
        },
        {
          "id": "slide_02",
          "title": "目录",
          "content": "1. 研究背景与挑战\n2. DocSAM 方法概述\n3. 模型架构详解\n4. 实验设置与结果分析\n5. 结论与未来工作",
          "tables": [],
          "figures": []
        },
        {
          "id": "slide_03",
          "title": "研究背景与挑战",
          "content": "文档图像分割（DIS）是文档分析与识别的基础任务，但面临以下挑战：\n- 文档格式多样、结构复杂（见图1）\n- 现有方法针对特定子任务（如布局分析、表格识别、文本检测）分别建模，导致模型碎片化\n- 多个专用模型带来计算和存储资源浪费\n- 难以泛化到新任务或新数据",
          "tables": [],
          "figures": [
            {
              "fig_id": "fig_1"
            }
          ]
        },
        {
          "id": "slide_04",
          "title": "DocSAM 核心思想",
          "content": "提出统一框架 DocSAM，将多种文档图像分割任务（布局分析、多粒度文本分割、表格结构识别）统一为实例分割与语义分割的组合。\n- 利用 Sentence-BERT 将类别名称映射为语义查询\n- 语义查询与可学习的实例查询通过注意力机制交互\n- 联合预测实例掩码、语义掩码、类别和边界框\n- 支持在异构数据集上联合训练，提升泛化能力并降低资源开销",
          "tables": [],
          "figures": [
            {
              "fig_id": "fig_2"
            }
          ]
        },
        {
          "id": "slide_05",
          "title": "支持的多样化任务与数据集",
          "content": "DocSAM 在近50个异构数据集上进行训练，覆盖四大类任务：\n- 文档布局分析（如 PubLayNet, DocLayNet, M⁶Doc）\n- 古籍与手写文档分割（如 SCUT-CAB, CASIA-HWDB）\n- 表格结构识别（如 FinTabNet, PubTabNet, TableBank）\n- 场景文本检测（如 CTW1500, Total-Text, ICDAR2015）\n体现了极强的数据多样性与任务异构性。",
          "tables": [
            {
              "table_id": "table_1"
            }
          ],
          "figures": []
        },
        {
          "id": "slide_06",
          "title": "模型架构详解",
          "content": "DocSAM 包含四个核心模块：\n1. Vision Backbone（Swin Transformer）提取多尺度特征\n2. Deformable Encoder 使用可变形注意力精炼特征\n3. Sentence-BERT 将类别名编码为语义查询\n4. Hybrid Query Decoder（HQD）：\n   - 语义查询与实例查询融合交互\n   - 分别与图像特征进行多尺度交叉注意力\n   - 输出送入 Mask/Class/BBox 预测头\n通过矩阵乘法实现基于原型的开放集分类。",
          "tables": [],
          "figures": [
            {
              "fig_id": "fig_2"
            }
          ]
        },
        {
          "id": "slide_07",
          "title": "异构混合学习策略",
          "content": "为高效训练统一模型，采用三项关键技术：\n1. **课程学习（Curriculum Learning）**：按任务相似性分组，逐步引入新数据\n2. **实例查询选择（IQS）**：动态过滤低置信度查询，加速训练并节省内存\n3. **平衡采样策略**：按类别数平方根加权采样，避免大数据集主导训练\n注：SimMIM 预训练在此任务中效果不佳，未被采用。",
          "tables": [
            {
              "table_id": "table_2"
            }
          ],
          "figures": [
            {
              "fig_id": "fig_3"
            }
          ]
        },
        {
          "id": "slide_08",
          "title": "实验结果：统一预训练 vs 从头训练",
          "content": "在多个数据集上验证 DocSAM 作为预训练模型的有效性：\n- 统一预训练后直接测试已具良好性能\n- 在特定数据集上微调显著优于从头训练（如 PubLayNet mAP 从 0.696 提升至 0.854）\n- 对未见过的数据集（如 IIIT-AR-13K, CHDAC-2022）微调也带来大幅增益\n证明模型具备强大迁移能力和持续学习潜力。",
          "tables": [
            {
              "table_id": "table_4"
            }
          ],
          "figures": []
        },
        {
          "id": "slide_09",
          "title": "与SOTA方法对比",
          "content": "在多个基准上与现有方法比较：\n- 在 M⁶Doc 和 SCUT-CAB 上达到领先或次优性能（见表5、6）\n- 在场景文本检测（CTW1500, Total-Text）上表现较弱（见表7），因该任务对形状和背景多样性要求极高\n- 作为单模态统一模型，在逻辑布局分析等需多模态信息的任务上仍有提升空间\n总体在准确性、效率和适应性上优于专用模型。",
          "tables": [
            {
              "table_id": "table_5"
            },
            {
              "table_id": "table_6"
            },
            {
              "table_id": "table_7"
            }
          ],
          "figures": []
        },
        {
          "id": "slide_10",
          "title": "定性结果展示",
          "content": "DocSAM 在多种文档类型上展现强大分割能力：\n- 现代/历史文档布局分析（图4）\n- 古籍与手写文本分割（图5）\n- 表格结构识别（图6）\n- 场景文本检测（图7）\n同时存在失败案例：密集/弯曲/模糊文本、大表格单元过分割等（图8）。",
          "tables": [],
          "figures": [
            {
              "fig_id": "fig_4"
            },
            {
              "fig_id": "fig_5"
            },
            {
              "fig_id": "fig_6"
            },
            {
              "fig_id": "fig_7"
            },
            {
              "fig_id": "fig_8"
            }
          ]
        },
        {
          "id": "slide_11",
          "title": "结论与未来工作",
          "content": "本文贡献：\n- 提出 DocSAM，首个基于查询分解的统一文档图像分割框架\n- 实现多任务联合训练，显著减少模型数量与资源消耗\n- 在48个异构数据集上验证其泛化性、鲁棒性和实用性\n未来方向：\n- 扩展为多模态版本（结合OCR文本）\n- 优化训练策略以加速收敛\n- 提升在复杂场景（如逻辑布局、弯曲文本）下的性能",
          "tables": [],
          "figures": []
        }
      ]
    };

    // DOM elements
    const slidesContainer = document.getElementById('slidesContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    // State
    let currentSlideIndex = 0;
    const slideCount = pptData.slides.length;

    // Initialize slides
    pptData.slides.forEach(slide => {
      const slideEl = document.createElement('section');
      slideEl.className = 'slide';

      const titleEl = document.createElement('h1');
      titleEl.textContent = slide.title;
      slideEl.appendChild(titleEl);

      const contentEl = document.createElement('p');
      contentEl.textContent = slide.content;
      slideEl.appendChild(contentEl);

      // Render figures
      if (slide.figures && slide.figures.length > 0) {
        slide.figures.forEach(fig => {
          const img = document.createElement('img');
          img.src = 'data:image/jpeg;base64,';
          img.alt = fig.fig_id || 'figure';
          slideEl.appendChild(img);
        });
      }

      // Render tables as images
      if (slide.tables && slide.tables.length > 0) {
        slide.tables.forEach(table => {
          const img = document.createElement('img');
          img.src = 'data:image/jpeg;base64,';
          img.alt = table.table_id || 'table';
          slideEl.appendChild(img);
        });
      }

      slidesContainer.appendChild(slideEl);
    });

    // Set slides container width dynamically
    slidesContainer.style.width = `${slideCount * 100}vw`;

    // Update slide position
    function updateSlidePosition() {
      slidesContainer.style.transform = `translateX(-${currentSlideIndex * 100}vw)`;
      prevBtn.disabled = currentSlideIndex === 0;
      nextBtn.disabled = currentSlideIndex === slideCount - 1;
    }

    // Event listeners for buttons
    prevBtn.addEventListener('click', () => {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        updateSlidePosition();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentSlideIndex < slideCount - 1) {
        currentSlideIndex++;
        updateSlidePosition();
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && currentSlideIndex > 0) {
        currentSlideIndex--;
        updateSlidePosition();
      } else if (e.key === 'ArrowRight' && currentSlideIndex < slideCount - 1) {
        currentSlideIndex++;
        updateSlidePosition();
      }
    });

    // Initial render
    updateSlidePosition();
  </script>
</body>
</html>
